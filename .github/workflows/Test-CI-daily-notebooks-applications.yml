      - name: Setup python and classiq and nightly aws
        uses: ./.github/actions/setup_classiq_on_nightly
        with:
          aws-role: ${{ secrets.AWS_ROLE }}
          codeartifact-domain: ${{ secrets.CODEARTIFACT_DOMAIN }}
          codeartifact-owner: ${{ secrets.CODEARTIFACT_OWNER }}
          codeartifact-region: ${{ secrets.CODEARTIFACT_REGION }}
          nightly-m2m-secret-arn: ${{ secrets.NIGHTLY_M2M_SECRET_ARN }}
          pypi-nightly-name: ${{ secrets.PYPI_NIGHTLY_NAME }}

      - name: Get notebooks to tests
        id: list-files
        run: |
          shopt -s globstar
          echo "files=$(echo applications/**/*.ipynb)" >> $GITHUB_OUTPUT

      # # Run Notebook Tests
      # - name: Run Notebooks
      #   run: python -m pytest -c tests/config_weekly.ini tests/notebooks
      #   env:
      #     # to disable a warning in Jupyter notebooks
      #     JUPYTER_PLATFORM_DIRS: "1"
      #     # Passing which notebooks changed
      #     SHOULD_TEST_ALL_FILES: "false"
      #     LIST_OF_IPYNB_CHANGED: "${{ steps.list-files.outputs.files }}"
      #     LIST_OF_IPYNB_TESTS_CHANGED: ""
      #     # Altering test behavior
      #     LIMIT_TEST_LINKS_TO_FILES_ONLY: "false"

      - name: run some python
        shell: python
        run: |
          from classiq._internals import config
          from classiq._internals.client import Client
          from classiq._internals.host_checker import HostChecker
          from classiq.interface._version import VERSION as _VERSION
          from classiq.interface.interface_version import INTERFACE_VERSION


          print(f"{_VERSION=}")
          print(f"{INTERFACE_VERSION=}")
          print(f"\n{'-'*30}\n")

          c = Client(config.init())
          x = c.sync_call_api("get", "/interface_versions", use_versioned_url=False)
          print(x)
          print(f"\n{'-'*30}\n")

          checker = HostChecker(c, client_version=_VERSION)
          y = checker._get_interface_version()
          print(y)
          print(f"\n{'-'*30}\n")
          z = checker._get_host_version()
          print(z)
          print(f"\n{'-'*30}\n")

          checker.check_host_version()

          checker.check_deprecated_version()
        env:
          CLASSIQ_IDE: "https://nightly.platform.classiq.io"
          CLASSIQ_HOST: "https://nightly.platform.classiq.io"

