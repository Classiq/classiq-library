name: "Test CI (weekly) (notebooks: applications)"

on:
  schedule:
    - cron: "00 08 * * 6" # Saturday, 08:00 UTC
  workflow_dispatch:

defaults:
  run:
    shell: bash

jobs:
  nightly-test:
    permissions:
      id-token: write
      contents: read

    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          python -m pip install -U -r requirements.txt -r requirements_tests.txt

      - name: Install couenne solver
        env:
          COIN_DIST_URL: https://github.com/ampl/coin/releases/download/v20191215/coin-linux64.tar.gz
          LOCAL_BIN: ${{ runner.temp }}/.local/bin
        run: |
          set -eux
          mkdir -p "$LOCAL_BIN"
          echo "$LOCAL_BIN" >>"$GITHUB_PATH"
          wget -nv -O- "$COIN_DIST_URL" | tar -C "$RUNNER_TEMP" -xvz
          cp "${RUNNER_TEMP}/couenne" "${LOCAL_BIN}/couenne"
          chmod ugo+x "${LOCAL_BIN}/couenne"

      #
      # Setup Environment
      #
      # Configure AWS credentials
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4.0.2
        with:
          role-to-assume: ${{ secrets.AWS_ROLE }}
          aws-region: us-east-1
          mask-aws-account-id: true

      # Set authentication with M2M token
      - name: Set authentication
        run: .github/scripts/get_m2m_token.sh
        env:
          IS_DEV: "false"
          M2M_SECRET_ARN: "${{ secrets.PROD_M2M_SECRET_ARN }}"

      - name: Get notebooks to tests
        id: list-files
        run: |
          shopt -s globstar
          echo "files=$(echo applications/**/*.ipynb)" >> $GITHUB_OUTPUT

      # Run Notebook Tests
      - name: Run Notebooks
        run: python -m pytest -c tests/config_weekly.ini tests/notebooks
        env:
          # to disable a warning in Jupyter notebooks
          JUPYTER_PLATFORM_DIRS: "1"
          # Passing which notebooks changed
          SHOULD_TEST_ALL_FILES: "false"
          LIST_OF_IPYNB_CHANGED: "${{ steps.list-files.outputs.files }}"
          LIST_OF_IPYNB_TESTS_CHANGED: ""
          # Altering test behavior
          LIMIT_TEST_LINKS_TO_FILES_ONLY: "false"

      # Summarize results for Slack copy-paste
      - name: Summarize test results
        if: always()
        run: python .github/scripts/summarize_test_results.py --workflow-name "applications"
